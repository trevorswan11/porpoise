name: Coverage

on:
    push:
        branches: [main]
        paths:
            - ".github/workflows/coverage.yml"
            - "apps/**"
            - "packages/**"
            - "build.zig"
            - "build.zig.zon"

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    coverage:
        permissions:
            contents: write
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            - uses: mlugg/setup-zig@v2
              with:
                  version: 0.15.2

            - name: Cache Zig Folders
              uses: actions/cache@v4
              with:
                path: |
                  ${{ env.ZIG_LOCAL_CACHE_DIR }}
                  ${{ env.ZIG_GLOBAL_CACHE_DIR }}
                key: zig-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}
                restore-keys: |
                  ${{ runner.os }}-zig-

            - name: Fetch dependencies
              run: |
                  zig build --fetch=all -j2

            - name: Run coverage reporter
              run: |
                  zig build coverage

            - name: Deploy Badge to 'badges' branch
              uses: JamesIves/github-pages-deploy-action@v4
              with:
                folder: zig-out
                branch: badges
                single-commit: true
